<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SixBox — Здоровое питание с доставкой по Бишкеку</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { background: var(--paper); }
  .pagebar {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 4px;
    padding: 6px;
    background: rgba(7, 38, 15, 0.94);
    backdrop-filter: blur(20px);
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 50px -10px rgba(0,0,0,.3);
    max-width: calc(100vw - 32px);
    overflow-x: auto;
  }
  .pagebar button {
    padding: 10px 16px;
    border-radius: 999px;
    color: rgba(255,255,255,.7);
    font-size: 13px;
    font-weight: 600;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .pagebar button.active {
    background: var(--orange-500);
    color: #1a0a00;
  }
  .pagebar button:hover:not(.active) { color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="heroes.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="subpages.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="info-pages.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function Landing() {
  return (
    <div data-screen-label="Landing">
      <HeroDark tweaks={{ headingScale: 1, cardRadius: 22 }} />
      <HowItWorks />
      <MenuWeek />
      <Plans />
      <Calculator />
      <Fridge />
      <Results />
      <Team />
      <FAQ />
      <Contact />
      <Footer />
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");

  useEffect(() => {
    window.go = (id, sectionId) => {
      setPage(id);
      if (sectionId) {
        setTimeout(() => {
          const el = document.getElementById(sectionId);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 60);
      } else {
        window.scrollTo({ top: 0, behavior: "instant" });
      }
    };
  }, []);

  const pages = [
    { id: "home", label: "Главная" },
    { id: "menu", label: "Меню" },
    { id: "constructor", label: "Конструктор" },
    { id: "cart", label: "Корзина" },
    { id: "checkout", label: "Оплата" },
    { id: "account", label: "Кабинет" },
    { id: "contacts", label: "Контакты" },
  ];

  return (
    <>
      {page === "home" && <Landing />}
      {page === "menu" && <MenuPage />}
      {page === "constructor" && <ConstructorPage />}
      {page === "cart" && <CartPage />}
      {page === "checkout" && (<><Checkout /><Footer /></>)}
      {page === "account" && (<><AccountDashboard /><Footer /></>)}
      {page === "contacts" && <ContactsPage />}
      {page === "blog" && <BlogPage />}
      {page === "about" && <AboutPage />}
      {page === "kitchen" && <KitchenPage />}
      {page === "careers" && <CareersPage />}
      {page === "partners" && <PartnersPage />}
      {page === "delivery" && <DeliveryPage />}
      {page === "allergens" && <AllergensPage />}
      {page === "privacy" && <LegalPage kind="privacy" />}
      {page === "offer" && <LegalPage kind="offer" />}

      <div className="pagebar" role="tablist">
        {pages.map(p => (
          <button
            key={p.id}
            className={page === p.id ? "active" : ""}
            onClick={() => window.go(p.id)}
          >
            {p.label}
          </button>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
